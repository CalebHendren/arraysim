.den-bond{width:20px;display:flex;align-items:center;justify-content:center;font-size:.5rem;color:#475569;transition:opacity .6s}
.den-helix.separated .den-bond{opacity:0}
.den-temp{font-size:1.8rem;font-weight:800;transition:all .8s;font-family:'JetBrains Mono',monospace}
.den-temp.hot{color:#f97316;text-shadow:0 0 20px rgba(249,115,22,.4)}
.den-temp.cool{color:#64748b}
.den-caption{font-size:.82rem;color:#94a3b8;text-align:center;max-width:400px;line-height:1.5;min-height:3em}@media(max-width:640px){:root{--seq-well:.46rem;--seq-card:.44rem;--seq-strand-well:.4rem;--seq-strand-list:.7rem;--seq-strand-side:.6rem}.pl{gap:5px;padding:8px;max-width:560px}.wl{min-height:76px}.wid{font-size:.62rem}.wlbl{font-size:.5rem}.bnd{font-size:.45rem}.fdw{width:8px;height:8px;top:4px;right:6px}.rmb{width:15px;height:15px;font-size:.5rem}.pc{width:105px;padding:6px 10px}.pc .pcl{font-size:.66rem}.sc{max-width:330px;padding:6px 10px}.sn{font-size:.66rem;width:22px}.ldz{width:22px;height:22px}.hlr{width:100%}.hl{flex-direction:column;align-items:center}.hlr h4{font-size:.72rem}.us{padding:5px 8px}.usn{font-size:.58rem;width:16px}.fds{width:9px;height:9px}}
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const PROBES = [
  { id: "NC", label: "Neg. Control", seq: "\u2014  No Probe  \u2014", pathogen: "None" },
  { id: "P1", label: "Probe 1", seq: "ATGCGATCCTAG", pathogen: "Human DNA (Positive Control)" },
  { id: "P2", label: "Probe 2", seq: "GCTTAACCGGAT", pathogen: "Hepatitis B Virus" },
  { id: "P3", label: "Probe 3", seq: "CCAAGGTTTCCA", pathogen: "West Nile Virus" },
  { id: "P4", label: "Probe 4", seq: "TTGGCCAATTGG", pathogen: "Plasmodium (Malaria)" },
  { id: "P5", label: "Probe 5", seq: "AACCTTGGAACC", pathogen: "Hepatitis C Virus" },
  { id: "P6", label: "Probe 6", seq: "GGTTCCAAGGTT", pathogen: "Treponema pallidum (Syphilis)" },
  { id: "P7", label: "Probe 7", seq: "CCTTAAGGCCTT", pathogen: "HIV" },
];

const isComplement = (a, b) => {
  if (a.length !== b.length) return false;
  const pairs = { A: "TU", T: "A", U: "A", G: "C", C: "G" };
  return a.split("").every((ch, i) => pairs[ch] && pairs[ch].includes(b[i]));
};

const PATIENTS = {
  Orange: {
    color: "#F97316", strands: [
      { id: "s1", seq: "TACGCTAGGATC", bindsTo: "P1" },
      { id: "s2", seq: "CGAATTGGCCTA", bindsTo: "P2" },
      { id: "s3", seq: "AACCGGTTAACC", bindsTo: "P4" },
      { id: "s4", seq: "TTAGCAATCGGT", bindsTo: null },
      { id: "s5", seq: "GCAATCGGTACC", bindsTo: null },
      { id: "s6", seq: "CCGATTAGCAAT", bindsTo: null },
      { id: "s7", seq: "AATTCCGGATTA", bindsTo: null },
    ], answer: ["Human DNA (Positive Control)", "Hepatitis B Virus", "Plasmodium (Malaria)"],
  },
  Blue: {
    color: "#3B82F6", strands: [
      { id: "s1", seq: "TACGCTAGGATC", bindsTo: "P1" },
      { id: "s2", seq: "GGUUCCAAAGGU", bindsTo: "P3" },
      { id: "s3", seq: "GGAAUUCCGGAA", bindsTo: "P7" },
      { id: "s4", seq: "TTAGCAATCGGT", bindsTo: null },
      { id: "s5", seq: "TTCGAACCGATT", bindsTo: null },
      { id: "s6", seq: "CCGATTAGCAAT", bindsTo: null },
      { id: "s7", seq: "GCAATCGGTACC", bindsTo: null },
    ], answer: ["Human DNA (Positive Control)", "West Nile Virus", "HIV"],
  },
  Green: {
    color: "#22C55E", strands: [
      { id: "s1", seq: "TACGCTAGGATC", bindsTo: "P1" },
      { id: "s2", seq: "UUGGAACCUUGG", bindsTo: "P5" },
      { id: "s3", seq: "CCAAGGTTCCAA", bindsTo: "P6" },
      { id: "s4", seq: "AATTCCGGATTA", bindsTo: null },
      { id: "s5", seq: "TTAGCAATCGGT", bindsTo: null },
      { id: "s6", seq: "TTCGAACCGATT", bindsTo: null },
      { id: "s7", seq: "GCAATCGGTACC", bindsTo: null },
    ], answer: ["Human DNA (Positive Control)", "Hepatitis C Virus", "Treponema pallidum (Syphilis)"],
  },
  Purple: {
    color: "#A855F7", strands: [
      { id: "s1", seq: "TACGCTAGGATC", bindsTo: "P1" },
      { id: "s2", seq: "CGAATTGGCCTA", bindsTo: "P2" },
      { id: "s3", seq: "GGUUCCAAAGGU", bindsTo: "P3" },
      { id: "s4", seq: "UUGGAACCUUGG", bindsTo: "P5" },
      { id: "s5", seq: "TTAGCAATCGGT", bindsTo: null },
      { id: "s6", seq: "CCGATTAGCAAT", bindsTo: null },
      { id: "s7", seq: "AATTCCGGATTA", bindsTo: null },
    ], answer: ["Human DNA (Positive Control)", "Hepatitis B Virus", "West Nile Virus", "Hepatitis C Virus"],
  },
};

const STEPS = ["Place Probes", "Select Patient", "Denature", "Label DNA", "Base-Pair to Platform", "Wash & Results"];
const getProbe = (id) => PROBES.find(p => p.id === id);

const Seq = ({ seq, size }) => {
  const sz = size || "0.5rem";
  const colors = { A: "#60a5fa", T: "#f87171", G: "#4ade80", C: "#fbbf24", U: "#e879f9" };
  return (
    <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: sz, letterSpacing: "0.03em", lineHeight: 1.3, wordBreak: "break-all", textAlign: "center" }}>
      {seq.split("").map((ch, i) => <span key={i} style={{ color: colors[ch] || "#64748b" }}>{ch}</span>)}
    </span>
  );
};

function App() {
  const [step, setStep] = useState(0);
  const [wells, setWells] = useState(Array(8).fill(null));
  const [patient, setPatient] = useState(null);
  const [labeled, setLabeled] = useState(new Set());
  const [strandOrder, setStrandOrder] = useState([]);
  const [wellStrands, setWellStrands] = useState({});
  const [washed, setWashed] = useState(false);
  const [washing, setWashing] = useState(false);
  const [washResults, setWashResults] = useState(null);
  const [showKey, setShowKey] = useState(false);
  const [denatured, setDenatured] = useState(false);
  const [denaturing, setDenaturing] = useState(false);
  const [dragType, setDragType] = useState(null);
  const [dragId, setDragId] = useState(null);
  const ghostRef = useRef(null);
  const isDraggingRef = useRef(false);

  const pat = patient ? PATIENTS[patient] : null;
  const placedProbes = new Set(wells.filter(Boolean));
  const placedStrandIds = new Set(Object.values(wellStrands));
  const allProbesPlaced = wells.every(w => w !== null);
  const allLabeled = pat ? pat.strands.every(s => labeled.has(s.id)) : false;

  useEffect(() => {
    if (patient && PATIENTS[patient]) {
      const idx = PATIENTS[patient].strands.map((_, i) => i);
      for (let i = idx.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[idx[i], idx[j]] = [idx[j], idx[i]]; }
      setStrandOrder(idx);
    }
  }, [patient]);

  const resetAll = () => {
    setStep(0); setWells(Array(8).fill(null)); setPatient(null);
    setLabeled(new Set()); setStrandOrder([]); setWellStrands({});
    setWashed(false); setWashing(false); setWashResults(null); setShowKey(false);
    setDenatured(false); setDenaturing(false);
  };

  // Lock/unlock scrolling
  const lockScroll = useCallback(() => {
    isDraggingRef.current = true;
    document.body.classList.add("dragging");
  }, []);

  const unlockScroll = useCallback(() => {
    isDraggingRef.current = false;
    document.body.classList.remove("dragging");
  }, []);

  // Desktop drag
  const startDrag = (type, id, e) => {
    setDragType(type); setDragId(id);
    if (e.dataTransfer) { e.dataTransfer.setData("text/plain", type + ":" + id); e.dataTransfer.effectAllowed = "move"; }
  };

  // Touch drag — prevents scrolling for the entire gesture
  const startTouch = (type, id, e) => {
    e.preventDefault(); // prevent scroll from starting
    lockScroll();
    const t = e.touches[0]; const el = e.currentTarget;
    const g = el.cloneNode(true);
    Object.assign(g.style, { position: "fixed", pointerEvents: "none", opacity: "0.8", zIndex: "9999", width: el.offsetWidth + "px", left: t.clientX - el.offsetWidth / 2 + "px", top: t.clientY - 25 + "px", transition: "none" });
    document.body.appendChild(g);
    ghostRef.current = g;
    setDragType(type); setDragId(id);
  };

  // Global touch move/end — blocks scroll while dragging
  useEffect(() => {
    const mv = (e) => {
      if (!isDraggingRef.current) return;
      e.preventDefault(); // block scroll during drag
      if (ghostRef.current) {
        const t = e.touches[0];
        ghostRef.current.style.left = t.clientX - ghostRef.current.offsetWidth / 2 + "px";
        ghostRef.current.style.top = t.clientY - 25 + "px";
      }
    };
    const en = (e) => {
      if (!isDraggingRef.current) return;
      if (ghostRef.current) { document.body.removeChild(ghostRef.current); ghostRef.current = null; }
      unlockScroll();
      if (!dragType || !dragId) return;
      const t = e.changedTouches[0]; const els = document.elementsFromPoint(t.clientX, t.clientY);
      if (dragType === "probe") {
        const wellEl = els.find(el => el.dataset.wellIdx !== undefined);
        if (wellEl) { const i = parseInt(wellEl.dataset.wellIdx); if (wells[i] === null) setWells(p => { const n = [...p]; n[i] = dragId; return n; }); }
      } else if (dragType === "fluor") {
        const sEl = els.find(el => el.dataset.strandId);
        if (sEl) setLabeled(p => new Set([...p, sEl.dataset.strandId]));
      } else if (dragType === "strand") {
        const wEl = els.find(el => el.dataset.wellDrop !== undefined);
        if (wEl) {
          const idx = parseInt(wEl.dataset.wellDrop);
          setWellStrands(prev => { const n = Object.assign({}, prev); Object.keys(n).forEach(k => { if (n[k] === dragId) delete n[k]; }); n[idx] = dragId; return n; });
        }
      }
      setDragType(null); setDragId(null);
    };
    window.addEventListener("touchmove", mv, { passive: false });
    window.addEventListener("touchend", en);
    return () => { window.removeEventListener("touchmove", mv); window.removeEventListener("touchend", en); };
  }, [dragType, dragId, wells]);

  const onGenericDrop = (e, type, handler) => {
    e.preventDefault();
    const data = e.dataTransfer.getData("text/plain");
    const parts = data.split(":");
    if (parts[0] === type) handler(parts.slice(1).join(":"));
    setDragType(null); setDragId(null);
  };

  const doWash = () => {
    setWashing(true);
    setTimeout(() => {
      const results = {};
      wells.forEach((probeId, idx) => {
        if (!probeId || probeId === "NC") { results[idx] = null; return; }
        const sid = wellStrands[idx];
        if (!sid) { results[idx] = null; return; }
        const strand = pat.strands.find(s => s.id === sid);
        const probe = getProbe(probeId);
        if (!strand || !probe || probe.id === "NC") { results[idx] = null; return; }
        results[idx] = isComplement(strand.seq, probe.seq) ? "correct" : "wrong";
      });
      setWashResults(results); setWashed(true); setWashing(false);
    }, 2000);
  };

  const getMissed = () => {
    if (!pat || !washResults) return [];
    const correct = new Set();
    Object.entries(washResults).forEach(([i, r]) => { if (r === "correct") correct.add(wellStrands[parseInt(i)]); });
    return pat.strands.filter(s => s.bindsTo && !correct.has(s.id));
  };

  const correctCount = washResults ? Object.values(washResults).filter(r => r === "correct").length : 0;
  const wrongCount = washResults ? Object.values(washResults).filter(r => r === "wrong").length : 0;
  const missed = getMissed();

  return (
    <div>
      <div className="hdr">
        <h1>{"\uD83E\uDDEC"} Nucleic Acid Identification Test</h1>
        <p>Base-pair patient DNA to identify pathogens</p>
      </div>
      <div className="sbar">{STEPS.map((s, i) => <div key={i} className={"sp" + (i === step ? " on" : i < step ? " dn" : "")}>{i < step ? "\u2713 " : ""}{s}</div>)}</div>
      <div className="bd">

        {/* STEP 0: PLACE PROBES */}
        {step === 0 && <div className="fade">
          <div className="info"><span className="ic">{"\uD83D\uDD2C"}</span><div className="tx"><b>Step 1: Place Probes on the Platform</b><br/>Drag each probe card onto an empty well. Click a filled well to remove it.</div></div>
          <div className="pw">
            <div className="pl">
              {wells.map((pid, idx) => {
                const pr = pid ? getProbe(pid) : null;
                return <div key={idx} data-well-idx={idx} className={"wl" + (pr ? " fl" : "") + (dragType === "probe" && !pr ? " dt" : "")}
                  onDragOver={e => e.preventDefault()} onDrop={e => onGenericDrop(e, "probe", id => { if (wells[idx] === null) setWells(p => { const n = [...p]; n[idx] = id; return n; }); })}
                  onClick={() => { if (step === 0 && pr) setWells(p => { const n = [...p]; n[idx] = null; return n; }); }}>
                  {pr ? <><span className="wid">{pr.label}</span><div className="wseq"><Seq seq={pr.seq} size="var(--seq-well)"/></div></> : <span className="wlbl">Well {idx + 1}</span>}
                </div>;
              })}
            </div>
            <div className="pt">
              {PROBES.map(p => <div key={p.id} className={"pc" + (placedProbes.has(p.id) ? " placed" : "")}
                draggable={!placedProbes.has(p.id)} onDragStart={e => startDrag("probe", p.id, e)}
                onTouchStart={!placedProbes.has(p.id) ? e => startTouch("probe", p.id, e) : undefined}>
                <div className="pcl">{p.label}</div><div className="wseq"><Seq seq={p.seq} size="var(--seq-card)"/></div>
              </div>)}
            </div>
          </div>
          <div className="br"><button className="btn bp" disabled={!allProbesPlaced} onClick={() => setStep(1)}>{allProbesPlaced ? "Continue \u2192" : "Place " + (8 - wells.filter(Boolean).length) + " more"}</button></div>
        </div>}

        {/* STEP 1: SELECT PATIENT */}
        {step === 1 && <div className="fade">
          <div className="info"><span className="ic">{"\uD83E\uDE78"}</span><div className="tx"><b>Step 2: Select a Patient Sample</b><br/>Choose a blood sample containing unknown nucleic acids.</div></div>
          <div className="pr">{Object.entries(PATIENTS).map(([n, d]) =>
            <button key={n} className={"pb" + (patient === n ? " sel" : "")}
              style={{ borderColor: patient === n ? d.color : undefined, color: d.color, boxShadow: patient === n ? "0 0 16px " + d.color + "33" : undefined }}
              onClick={() => { setPatient(n); setLabeled(new Set()); setWellStrands({}); setWashed(false); setWashResults(null); setShowKey(false); setDenatured(false); setDenaturing(false); }}>
              {"\uD83E\uDDEA"} {n}
            </button>)}
          </div>
          <div className="br"><button className="btn bo" onClick={() => setStep(0)}>{"\u2190"} Back</button><button className="btn bp" disabled={!patient} onClick={() => setStep(2)}>Continue {"\u2192"}</button></div>
        </div>}

        {/* STEP 2: DENATURE */}
        {step === 2 && pat && <div className="fade">
          <div className="info"><span className="ic">{"\uD83C\uDF21"}</span><div className="tx"><b>Step 3: Denature the Sample</b><br/>Heat the patient sample to <b>~95°C</b> to break hydrogen bonds and separate double-stranded DNA into single strands. Single-stranded nucleic acids can then hybridize with the probes on the platform.</div></div>
          <div className="den-wrap">
            <div className={"den-temp " + (denaturing || denatured ? "hot" : "cool")}>{denaturing || denatured ? "95\u00B0C" : "25\u00B0C"}</div>
            <div className="den-visual">
              <div className={"den-helix" + (denatured ? " separated" : "")}>
                <div className="den-strand-l">
                  {"ATGCGA".split("").map((b, i) => <div key={i} className="den-bp" style={{color:{A:"#60a5fa",T:"#f87171",G:"#4ade80",C:"#fbbf24"}[b]}}>{b}</div>)}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                  {"......".split("").map((_, i) => <div key={i} className="den-bond">{denatured ? "" : "\u2500"}</div>)}
                </div>
                <div className="den-strand-r">
                  {"TACGCT".split("").map((b, i) => <div key={i} className="den-bp" style={{color:{A:"#60a5fa",T:"#f87171",G:"#4ade80",C:"#fbbf24"}[b]}}>{b}</div>)}
                </div>
              </div>
            </div>
            <div className="den-caption">
              {!denaturing && !denatured && "The patient sample contains double-stranded DNA. Hydrogen bonds hold the complementary strands together. Click Heat to denature."}
              {denaturing && "Heating to 95\u00B0C\u2026 hydrogen bonds are breaking\u2026"}
              {denatured && !denaturing && "Denaturation complete. The nucleic acids are now single-stranded and ready to be labeled and hybridized with your probes."}
            </div>
          </div>
          <div className="br">
            <button className="btn bo" onClick={() => { setStep(1); setDenatured(false); setDenaturing(false); }}>{"\u2190"} Back</button>
            {!denatured ? <button className="btn bp" style={{background:"#c2410c"}} disabled={denaturing} onClick={() => {
              setDenaturing(true);
              setTimeout(() => { setDenatured(true); setDenaturing(false); }, 1800);
            }}>{denaturing ? "Heating\u2026" : "\uD83C\uDF21 Heat to 95\u00B0C"}</button>
            : <button className="btn bp" onClick={() => setStep(3)}>Continue {"\u2192"}</button>}
          </div>
        </div>}

        {/* STEP 3: LABEL */}
        {step === 3 && pat && <div className="fade">
          <div className="info"><span className="ic">{"\uD83D\uDCA1"}</span><div className="tx"><b>Step 4: Attach Fluorescent Labels</b><br/>Click each strand (or drag the marker) to label it. Labels let you detect binding.</div></div>
          <div style={{ textAlign: "center" }}>
            <div className="fs" draggable onDragStart={e => startDrag("fluor", "f", e)} onTouchStart={e => startTouch("fluor", "f", e)}>
              <span className="fd"/> Fluorescent Marker
            </div>
          </div>
          <div className="st">{strandOrder.map(i => {
            const s = pat.strands[i]; const isL = labeled.has(s.id);
            return <div key={s.id} data-strand-id={s.id} className={"sc" + (isL ? " lab" : "")}
              onDragOver={e => e.preventDefault()} onDrop={e => onGenericDrop(e, "fluor", () => setLabeled(p => new Set([...p, s.id])))}
              onClick={() => { if (!isL) setLabeled(p => new Set([...p, s.id])); }}>
              <span className="sn">#{i + 1}</span><div className="ss"><Seq seq={s.seq} size="var(--seq-strand-list)"/></div>
              <div className={"ldz" + (isL ? " on" : "") + (dragType === "fluor" ? " act" : "")}>{isL && <span style={{ fontSize: ".5rem", color: "#fff" }}>{"\u2726"}</span>}</div>
            </div>;
          })}</div>
          <div className="br"><button className="btn bo" onClick={() => setStep(2)}>{"\u2190"} Back</button>
            <button className="btn bp" disabled={!allLabeled} onClick={() => setStep(4)}>{allLabeled ? "Base-Pair \u2192" : "Label " + (pat.strands.length - labeled.size) + " more"}</button></div>
        </div>}

        {/* STEP 4: BASE-PAIR */}
        {step === 4 && pat && !washed && <div className="fade">
          <div className="info"><span className="ic">{"\uD83E\uDDEC"}</span><div className="tx"><b>Step 5: Base-Pair Strands to Probes</b><br/>Read each sequence. <b>Drag patient strands to the well with the complementary probe</b>. Remember: <span style={{color:"#e879f9",fontWeight:700}}>U</span> pairs with <span style={{color:"#60a5fa",fontWeight:700}}>A</span> (just like T does). Not every strand matches a probe {"\u2014"} leave non-matching strands in the tray.</div></div>
          <div className="bpr">
            <div className="bpc"><span className="b bA">A</span>{"\u27F7"}<span className="b bT">T</span></div>
            <div className="bpc"><span className="b bA">A</span>{"\u27F7"}<span className="b bU">U</span></div>
            <div className="bpc"><span className="b bG">G</span>{"\u27F7"}<span className="b bC">C</span></div>
            <div className="bpc"><span className="b bC">C</span>{"\u27F7"}<span className="b bG">G</span></div>
          </div>
          <div className="hl">
            <div className="hlf">
              <div className="pw">
                <div className="pl">
                  {wells.map((probeId, idx) => {
                    const pr = probeId ? getProbe(probeId) : null;
                    const sid = wellStrands[idx]; const strand = sid ? pat.strands.find(s => s.id === sid) : null;
                    return <div key={idx} data-well-drop={idx} className={"wl fl" + (strand ? " has-strand" : "") + (dragType === "strand" && !strand && probeId !== "NC" ? " dt" : "")}
                      onDragOver={e => e.preventDefault()} onDrop={e => onGenericDrop(e, "strand", sid => {
                        setWellStrands(prev => { const n = Object.assign({}, prev); Object.keys(n).forEach(k => { if (n[k] === sid) delete n[k]; }); n[idx] = sid; return n; });
                      })}>
                      <span className="wid">{pr ? pr.label : ""}</span>
                      <div className="wseq"><Seq seq={pr ? pr.seq : ""} size="var(--seq-well)"/></div>
                      {strand ? <>
                        <div className="wsm"><Seq seq={strand.seq} size="var(--seq-strand-well)"/></div>
                        <div className="fdw"/><button className="rmb" onClick={e => { e.stopPropagation(); setWellStrands(prev => { const n = Object.assign({}, prev); delete n[idx]; return n; }); }}>{"\u2715"}</button>
                      </> : probeId !== "NC" && <span style={{ fontSize: ".38rem", color: "#334155", marginTop: 2 }}>drop strand</span>}
                    </div>;
                  })}
                  {washing && <div className="washov"/>}
                </div>
              </div>
            </div>
            <div className="hlr">
              <h4>{"\uD83E\uDDEA"} Patient Strands</h4>
              <div className="ut">{strandOrder.map(i => {
                const s = pat.strands[i]; const isP = placedStrandIds.has(s.id);
                return <div key={s.id} className={"us" + (isP ? " placed" : "")}
                  draggable={!isP} onDragStart={e => startDrag("strand", s.id, e)}
                  onTouchStart={!isP ? e => startTouch("strand", s.id, e) : undefined}>
                  <span className="fds"/><span className="usn">#{i + 1}</span><div className="ss"><Seq seq={s.seq} size="var(--seq-strand-side)"/></div>
                </div>;
              })}</div>
            </div>
          </div>
          <div className="br">
            <button className="btn bo" onClick={() => { setStep(3); setWellStrands({}); }}>{"\u2190"} Back</button>
            <button className="btn bg" onClick={doWash} disabled={Object.keys(wellStrands).length === 0 || washing}>{washing ? "Washing..." : "\uD83E\uDDEB Wash Platform"}</button>
          </div>
        </div>}

        {/* RESULTS */}
        {step === 4 && washed && pat && <div className="fade">
          <div className="info"><span className="ic">{"\uD83D\uDD0E"}</span><div className="tx"><b>Step 6: Read Results</b><br/>Wells with correctly base-paired strands <b style={{ color: "#22c55e" }}>glow green</b>. Mismatched strands were washed away.</div></div>
          <div className="pw">
            <div className="pl">
              {wells.map((probeId, idx) => {
                const pr = probeId ? getProbe(probeId) : null;
                const res = washResults ? washResults[idx] : null; const glows = res === "correct";
                const sid = wellStrands[idx]; const strand = sid ? pat.strands.find(s => s.id === sid) : null;
                return <div key={idx} className={"wl fl" + (glows ? " glow" : "") + (res === "wrong" ? " wrong" : "") + (!res ? " dim" : "")}>
                  <span className="wid">{pr ? pr.label : ""}</span>
                  <div className="wseq"><Seq seq={pr ? pr.seq : ""} size="var(--seq-well)"/></div>
                  {glows && strand && <div className="wsm"><Seq seq={strand.seq} size="var(--seq-strand-well)"/></div>}
                  {glows && <div className="fdw"/>}
                  {glows && <span className="bnd" style={{ color: "#22c55e" }}>{"\u2726"} BOUND</span>}
                  {res === "wrong" && <span className="bnd" style={{ color: "#f87171" }}>{"\u2717"} WASHED</span>}
                </div>;
              })}
            </div>
          </div>

          <div style={{ textAlign: "center", margin: "12px 0 4px", fontSize: ".82rem" }}>
            <span style={{ color: "#22c55e", fontWeight: 700 }}>{correctCount} correct</span>
            {wrongCount > 0 && <span style={{ color: "#f87171", fontWeight: 700 }}> {"\u00B7"} {wrongCount} washed away</span>}
            {missed.length > 0 && <span style={{ color: "#fbbf24", fontWeight: 700 }}> {"\u00B7"} {missed.length} missed</span>}
          </div>
          {wrongCount > 0 && <div className="mbox">{"\u26A0"} {wrongCount} strand{wrongCount > 1 ? "s" : ""} not complementary {"\u2014"} washed off.</div>}
          {missed.length > 0 && <div className="mbox">{"\u26A0"} {missed.length} matching strand{missed.length > 1 ? "s" : ""} left unplaced or on wrong well.</div>}

          <h3 style={{ textAlign: "center", margin: "16px 0 4px", color: "#22d3ee", fontSize: ".88rem", fontWeight: 700 }}>{"\uD83D\uDD11"} Probe Key</h3>
          <table className="kt"><thead><tr><th>Probe</th><th>Target Microorganism</th></tr></thead><tbody>
            {PROBES.filter(p => p.id !== "NC").map(p => <tr key={p.id}><td style={{ fontWeight: 600 }}>{p.label}</td><td>{p.pathogen}</td></tr>)}
          </tbody></table>

          <div className="br">
            <button className="btn bo" onClick={() => setShowKey(!showKey)}>{showKey ? "Hide Answer" : "\uD83D\uDD13 Check Answer"}</button>
            <button className="btn bp" onClick={() => { setWellStrands({}); setWashed(false); setWashResults(null); setShowKey(false); }}>{"\uD83D\uDD04"} Try Again</button>
          </div>
          {showKey && <div className="dbox fade"><h3>Patient {patient} {"\u2014"} Diagnosis</h3><ul>{pat.answer.map((a, i) => <li key={i}><span style={{ color: "#22c55e" }}>{"\u2726"}</span> {a}</li>)}</ul></div>}
          <div className="br"><button className="rl" onClick={resetAll}>{"\u21BB"} Start Over</button></div>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
